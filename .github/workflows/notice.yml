name: Check University Notices

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # 🔥 Restore cache
      - name: Restore last notice
        uses: actions/cache@v3
        with:
          path: last_notice.txt
          key: notice-cache

      - uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - run: pip install -r requirements.txt

      - name: Run script
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python main.py

      # 💾 Save cache
      - name: Save last notice
        uses: actions/cache@v3
        with:
          path: last_notice.txt
          key: notice-cache
